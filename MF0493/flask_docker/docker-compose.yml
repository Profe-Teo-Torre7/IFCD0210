services:
  flask:
    build: ./app
    container_name: flask_app
    expose:
      - "8000"
    networks:
      - flask-network

  nginx:
    image: nginx:latest
    container_name: nginx_http
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/certs
    depends_on:
      - flask
    networks:
      - flask-network

networks:
  flask-network:
    driver: bridge
