<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ficha Pokémon - Charizard</title>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9966,#ff5e62);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:360px;
    background:white;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    overflow:hidden;
}

.header{
    background:linear-gradient(90deg,#ff6a00,#ffb347);
    text-align:center;
    padding:20px;
    color:white;
}

.header h1{
    margin:0;
}

.sprite{
    text-align:center;
    margin-top:-40px;
}

.sprite img{
    width:180px;
}

.content{
    padding:20px;
}

.types{
    text-align:center;
    margin-bottom:15px;
}

.type{
    display:inline-block;
    padding:6px 12px;
    margin:4px;
    border-radius:20px;
    color:white;
    font-size:14px;
}

.fire{background:#f08030;}
.flying{background:#a890f0;}

.info{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:20px;
}

.stat{
    margin:8px 0;
}

.bar{
    height:8px;
    background:#eee;
    border-radius:10px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:linear-gradient(90deg,#ff6a00,#ffb347);
}

.footer{
    text-align:center;
    font-size:14px;
    color:#666;
    padding-bottom:15px;
}
</style>
</head>

<body>

<div class="card">

    <div class="header">
        <h1>Charizard</h1>
        <p>#006</p>
    </div>

    <div class="sprite">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png">
    </div>

    <div class="content">

        <div class="types">
            <span class="type fire">Fuego</span>
            <span class="type flying">Volador</span>
        </div>

        <div class="info">
            <div><b>Altura:</b> 1.7 m</div>
            <div><b>Peso:</b> 90.5 kg</div>
            <div><b>Habilidad:</b> Blaze</div>
            <div><b>Exp Base:</b> 267</div>
        </div>

        <h3>Estadísticas</h3>

        <div class="stat">
            HP
            <div class="bar"><div class="fill" style="width:78%"></div></div>
        </div>

        <div class="stat">
            Ataque
            <div class="bar"><div class="fill" style="width:84%"></div></div>
        </div>

        <div class="stat">
            Defensa
            <div class="bar"><div class="fill" style="width:78%"></div></div>
        </div>

        <div class="stat">
            Ataque Especial
            <div class="bar"><div class="fill" style="width:109%"></div></div>
        </div>

        <div class="stat">
            Velocidad
            <div class="bar"><div class="fill" style="width:100%"></div></div>
        </div>

    </div>

    <div class="footer">
        Pokédex interactiva
    </div>

</div>

</body>
</html>
